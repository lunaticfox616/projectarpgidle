<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projectidle</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #08080b; color: #ddd; padding: 15px; font-size: 14px; margin: 0; display: flex; height: 100vh; box-sizing: border-box; overflow: hidden; }
        #left-pane { width: 620px; min-width: 620px; display: flex; flex-direction: column; gap: 15px; margin-right: 15px; height: 100%; overflow: hidden; }
        #right-pane { flex: 1; display: flex; flex-direction: column; background-color: #121216; border: 1px solid #2a2a35; border-radius: 8px; height: 100%; overflow: hidden; position: relative; }
        .panel { background-color: #16161d; border: 1px solid #2a2a35; padding: 15px; border-radius: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .player-panel { flex-shrink: 0; }
        .combat-panel { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        h2 { border-bottom: 2px solid #3d3d5c; padding-bottom: 5px; font-size: 1.15em; margin-top: 0; color: #f39c12; display: flex; align-items: center; justify-content: space-between; }
        h3 { margin: 0 0 10px 0; color: #e67e22; }
        .tab-header { display: flex; background-color: #1a1a24; border-bottom: 1px solid #2a2a35; flex-shrink: 0; }
        .tab-btn { position: relative; flex: 1; padding: 12px 0; text-align: center; cursor: pointer; border-right: 1px solid #2a2a35; color: #888; font-weight: bold; transition: 0.2s; display: none; }
        .tab-btn:hover { background: #222230; color: #fff; }
        .tab-btn.active { background: #121216; color: #e67e22; border-bottom: 3px solid #e67e22; }
        .tab-content { padding: 15px; display: none; overflow-y: auto; flex: 1; height: 100%; box-sizing: border-box; }
        .tab-content.active { display: block; }
        .noti-dot { display: none; position: absolute; top: 10px; right: 10px; width: 8px; height: 8px; background-color: #e74c3c; border-radius: 50%; box-shadow: 0 0 5px #e74c3c; z-index: 10; }

        button { background-color: #2c3e50; color: #ecf0f1; border: 1px solid #34495e; padding: 6px 10px; cursor: pointer; border-radius: 4px; font-size: 0.9em; transition: 0.2s; font-weight: bold; }
        button:hover:not(:disabled) { background-color: #34495e; border-color: #7f8c8d; }
        button:disabled { background-color: #111; color: #555; border-color: #222; cursor: not-allowed; }
        input { background: #121620; color: #edf4fb; border: 1px solid #33465c; border-radius: 6px; padding: 10px 12px; font-size: 0.92em; box-sizing: border-box; }
        input::placeholder { color: #71859b; }
        input:focus { outline: none; border-color: #68c1ff; box-shadow: 0 0 0 2px rgba(104,193,255,0.15); }

        #log { flex: 1; min-height: 180px; overflow-y: auto; background: linear-gradient(180deg, #06080d 0%, #040509 100%); padding: 8px 10px; border: 1px solid #1a1a24; border-radius: 8px; font-family: 'Consolas', monospace; font-size: 0.84em; box-shadow: inset 0 0 18px rgba(0,0,0,0.35); }
        #log:empty::before { content: '전투 로그가 여기에 표시됩니다.'; display: block; color: #5f7387; padding-top: 4px; }
        .log-msg { margin-bottom: 4px; padding-bottom: 2px; border-bottom: 1px solid #111; line-height: 1.3; }
        .loot-normal { color: #bdc3c7; }
        .loot-magic { color: #3498db; font-weight: bold; }
        .loot-rare { color: #f1c40f; font-weight: bold; }
        .loot-unique { color: #ff9f43; font-weight: bold; text-shadow: 0 0 8px rgba(255,159,67,0.8); }
        .exp-txt { color: #9b59b6; }
        .level-up { color: #e056fd; font-weight: bold; text-shadow: 0 0 5px #9b59b6; }
        .season-up { color: #ff7979; font-weight: bold; text-shadow: 0 0 5px rgba(255,121,121,0.5); }
        .attack-player { color: #bdc3c7; }
        .attack-crit { color: #f39c12; font-weight: bold; }
        .attack-monster { color: #e74c3c; }
        .death { color: #c0392b; font-weight: bold; font-size: 1.1em; }

        .hp-bar-bg { width: 100%; background-color: #222; height: 16px; border-radius: 4px; overflow: hidden; margin-top: 2px; border: 1px solid #111; position: relative; }
        .hp-bar-fill { background-color: #eb3b5a; height: 100%; transition: width 0.1s linear; }
        .hp-bar-fill.player { background-color: #20bf6b; }
        .hp-bar-fill.move { background-color: #2d98da; }
        .hp-bar-fill.exp { background-color: #a55eea; }
        .hp-text { position: absolute; width: 100%; text-align: center; top: 0; left: 0; font-size: 10px; font-weight: bold; color: white; line-height: 16px; text-shadow: 1px 1px 2px black; pointer-events: none; }
        .summary-actions { display: flex; gap: 8px; margin-top: 12px; }
        .summary-actions button { flex: 1; }

        .item-card { background-color: #1a1a24; border: 1px solid #3d3d5c; padding: 10px; border-radius: 4px; position: relative; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; min-height: 132px; }
        .item-card:hover { border-color: #7f8c8d; background-color: #222230; }
        .item-card.selected { border-color: #e74c3c; box-shadow: 0 0 8px rgba(231,76,60,0.5); }
        .item-title { font-weight: bold; margin-bottom: 6px; font-size: 0.95em; }
        .item-title.normal { color: #d0d5da; }
        .item-title.magic { color: #3498db; }
        .item-title.rare { color: #f1c40f; }
        .item-title.unique { color: #ff9f43; text-shadow: 0 0 5px rgba(255,159,67,0.5); }
        .item-base-line { color: #95a5a6; font-size: 0.76em; margin-bottom: 4px; }
        .item-stats { color: #b2bec3; font-size: 0.8em; line-height: 1.4; }
        .item-actions { display: flex; gap: 5px; margin-top: 8px; }

        .stat-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px 18px; font-size: 0.85em; background: #111; padding: 12px; border-radius: 8px; border: 1px solid #222; margin-top: 10px; font-variant-numeric: tabular-nums; }
        .stat-item { display: grid; grid-template-columns: minmax(0, 1fr) auto auto; align-items: center; gap: 10px; padding: 4px 0; border-bottom: 1px dotted #333; }
        .stat-item.full { grid-column: 1 / span 2; grid-template-columns: minmax(0, 1fr) auto; margin-bottom: 2px; font-size: 1.08em; }
        .stat-item.tip { cursor: help; }
        .stat-item.tip:hover { color: #fff; }
        .stat-label { color: #c7d5e4; min-width: 0; }
        .stat-value { min-width: 56px; text-align: right; color: #eef5fc; font-weight: bold; }
        .stat-unit { min-width: 16px; text-align: right; color: #8ea3b8; }

        #item-tooltip-box, #canvas-tooltip, #info-tooltip { display: none; position: fixed; z-index: 9999; background: rgba(10,10,15,0.97); border: 1px solid #777; padding: 12px; border-radius: 6px; pointer-events: none; color: #eee; box-shadow: 0 5px 15px rgba(0,0,0,0.8); min-width: 200px; font-size: 0.9em; line-height: 1.5; }
        #canvas-tooltip { z-index: 1000; border-color: #f39c12; min-width: 180px; }
        #info-tooltip { z-index: 9998; max-width: 340px; }
        .tooltip-title { font-weight: bold; border-bottom: 1px solid #444; padding-bottom: 5px; margin-bottom: 6px; }
        .tooltip-line { color: #cbd5e1; }
        .tooltip-final { margin-top: 8px; color: #2ecc71; font-weight: bold; }
        .tutorial-overlay { display: none; position: fixed; inset: 0; z-index: 12000; background: rgba(4, 7, 12, 0.84); }
        .tutorial-overlay.active { display: flex; align-items: center; justify-content: center; }
        .tutorial-card { width: min(520px, calc(100vw - 32px)); background: linear-gradient(180deg, #171d28 0%, #0f131b 100%); border: 1px solid #32506d; border-radius: 18px; box-shadow: 0 18px 60px rgba(0,0,0,0.55); padding: 22px; }
        .tutorial-kicker { color: #7fc9ff; font-size: 0.78em; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
        .tutorial-title { color: #f6b34f; font-size: 1.35em; font-weight: bold; margin-bottom: 10px; }
        .tutorial-body { color: #d5dde8; line-height: 1.65; white-space: pre-line; }
        .tutorial-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
        .tutorial-actions button { min-width: 104px; }
        .tutorial-secondary { background: #25384a; border-color: #35536b; }
        .reward-grid { display: grid; gap: 12px; margin-top: 14px; }
        .reward-choice { background: linear-gradient(180deg, #171f2c 0%, #10151d 100%); border: 1px solid #31465d; border-radius: 12px; padding: 14px; text-align: left; color: #dce7f3; }
        .reward-choice:hover:not(:disabled) { border-color: #6cc8ff; background: linear-gradient(180deg, #1b2736 0%, #121a25 100%); }
        .reward-choice strong { display: block; color: #f6c461; margin-bottom: 5px; }
        .reward-choice small { display: block; color: #8daccc; margin-top: 4px; }
        .deathlog-card { width: min(560px, calc(100vw - 32px)); }
        .deathlog-panel { margin-top: 14px; padding: 14px; border-radius: 12px; background: #0f1520; border: 1px solid #2d4258; }
        .deathlog-subtitle { color: #9ecfff; font-size: 0.82em; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
        .deathlog-list { display: grid; gap: 8px; }
        .deathlog-line { display: flex; justify-content: space-between; gap: 12px; padding: 8px 10px; border-radius: 8px; background: #151d29; border: 1px solid #243446; color: #dce8f5; }
        .deathlog-setting { display: flex; align-items: center; gap: 8px; margin-top: 14px; color: #d5dde8; }

        .paperdoll { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: auto auto auto auto; gap: 8px; margin-bottom: 20px; }
        .slot-box { background: #1a1a24; border: 1px solid #3d3d5c; border-radius: 6px; padding: 6px; min-height: 65px; display: flex; flex-direction: column; justify-content: center; cursor: pointer; }
        .slot-box:hover { background-color: #222230; border-color: #7f8c8d; }
        .slot-box.selected { border-color: #e74c3c; box-shadow: 0 0 8px rgba(231,76,60,0.5); }
        .slot-투구 { grid-column: 2; grid-row: 1; } .slot-목걸이 { grid-column: 3; grid-row: 1; } .slot-무기 { grid-column: 1; grid-row: 2; } .slot-갑옷 { grid-column: 2; grid-row: 2; } .slot-장갑 { grid-column: 3; grid-row: 2; } .slot-반지1 { grid-column: 1; grid-row: 3; } .slot-허리띠 { grid-column: 2; grid-row: 3; } .slot-반지2 { grid-column: 3; grid-row: 3; } .slot-신발 { grid-column: 2; grid-row: 4; }

        .skill-gem { padding: 10px; border-radius: 4px; background-color: #2c3e50; border: 1px solid #34495e; cursor: pointer; transition: 0.2s; position: relative; }
        .skill-gem:hover { filter: brightness(1.2); }
        .skill-gem.active { background-color: #b33939; border: 1px solid #ff5252; box-shadow: 0 0 8px rgba(255,82,82,0.5); }
        .support-gem { background-color: #218c74; border: 1px solid #33d9b2; }
        .support-gem.active { background-color: #0fb9b1; border-color: #2bcbba; box-shadow: 0 0 8px rgba(43,203,186,0.5); }
        .gem-level-badge { position: absolute; top: 5px; right: 5px; background: #000; padding: 2px 5px; border-radius: 3px; font-size: 0.7em; font-weight: bold; border: 1px solid #555; color: #fff; }
        .gem-level-badge.effective { color: #2ecc71; border-color: #2ecc71; }

        .trait-tree { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 10px; padding: 15px; background: #0a0a0f; border-radius: 8px; border: 1px solid #333; position: relative; }
        .trait-row { display: flex; gap: 20px; justify-content: center; position: relative; width: 100%; z-index: 2; flex-wrap: wrap; }
        .trait-card { background: #16161d; border: 2px solid #3d3d5c; color: #ccc; padding: 10px; border-radius: 8px; cursor: pointer; width: 140px; text-align: center; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 5px; }
        .trait-card:hover:not(.locked) { border-color: #f1c40f; transform: translateY(-3px); }
        .trait-card.active { background: #2c1a0e; border-color: #e67e22; color: #fff; box-shadow: 0 0 10px rgba(230,126,34,0.4); }
        .trait-card.locked { opacity: 0.3; filter: grayscale(100%); pointer-events: none; border-color: #222; }
        .trait-title { font-weight: bold; font-size: 0.9em; color: #f1c40f; }
        .trait-desc { font-size: 0.75em; color: #95a5a6; }

        .class-card { background: #1a1a24; border: 2px solid #8e44ad; padding: 15px; border-radius: 6px; text-align: center; cursor: pointer; transition: 0.2s; }
        .class-card:hover { background: #2a1035; border-color: #9b59b6; transform: scale(1.05); }

        .map-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; }
        .map-item { padding: 12px; border: 1px solid #3d3d5c; border-radius: 4px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; gap: 12px; transition: 0.2s; cursor: pointer; background-color: #1a1a24; }
        .map-item:hover { filter: brightness(1.2); }
        .map-item.current { background: #2980b9; border-color: #3498db; color: #fff; box-shadow: 0 0 10px rgba(41,128,185,0.5); }
        .map-item.trial { border-color: #f1c40f; color: #f39c12; background: #2c2c1a; }
        .map-item-main { display: flex; align-items: center; gap: 8px; min-width: 0; }
        .map-item-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .map-reward-btn { background: linear-gradient(180deg, #6e5420 0%, #4a3815 100%); border-color: #b88a2b; color: #ffe7a2; font-size: 0.78em; padding: 5px 10px; }
        .map-reward-btn.claimed { background: #263544; border-color: #3a536c; color: #9fb9d1; }
        .map-zone-status { color: #8ca5be; font-size: 0.78em; font-weight: normal; }

        .subtab-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .subtab-btn { flex: 1; padding: 10px 0; background: #1a1a24; color: #888; border: 1px solid #2a2a35; border-radius: 6px; }
        .subtab-btn.active { background: #2b1e0d; border-color: #e67e22; color: #f1c40f; }
        .subtab-content { display: none; }
        .subtab-content.active { display: block; }

        .forge-panel { background: #111; border: 1px solid #d35400; padding: 15px; border-radius: 6px; margin-bottom: 16px; }
        .currency-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; margin-top: 12px; }
        .currency-card { background: #16161d; border: 1px solid #3d3d5c; padding: 10px; border-radius: 6px; }
        .currency-name { color: #f1c40f; font-weight: bold; margin-bottom: 4px; }
        .currency-desc { color: #95a5a6; font-size: 0.78em; min-height: 34px; }
        .currency-count { color: #3498db; margin-top: 6px; }
        .craft-layout { display: grid; grid-template-columns: 290px 1fr; gap: 15px; align-items: start; }
        .craft-selected { background: #0d0d12; border: 1px solid #333; border-radius: 6px; padding: 12px; min-height: 140px; }
        .craft-actions { display: grid; gap: 8px; margin-top: 12px; }
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 10px; }

        .combat-dashboard { display: grid; grid-template-columns: minmax(0, 2.05fr) minmax(190px, 0.7fr); gap: 10px; flex: 1; min-height: 0; align-items: stretch; }
        .combat-stage { display: flex; flex-direction: column; min-height: 0; }
        .combat-feed { display: flex; flex-direction: column; min-height: 0; height: 100%; padding: 10px; background: linear-gradient(180deg, #121822 0%, #0d1219 100%); border: 1px solid #26384a; border-radius: 12px; box-shadow: inset 0 0 18px rgba(0,0,0,0.25); }
        .combat-feed-title { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; color: #7fc9ff; font-weight: bold; font-size: 0.84em; letter-spacing: 0.05em; text-transform: uppercase; }
        .combat-feed-sub { color: #6f8296; font-size: 0.74em; font-weight: normal; text-transform: none; }
        .enemy-list { display: grid; grid-template-columns: 1fr; gap: 6px; margin-top: 6px; flex-shrink: 0; min-height: 0; max-height: 82px; overflow: hidden; align-content: start; }
        .enemy-card { background: linear-gradient(180deg, #151621 0%, #0d0f17 100%); border: 1px solid #2b3240; border-radius: 10px; padding: 8px 10px 9px; min-height: 58px; display: flex; flex-direction: column; gap: 5px; }
        .enemy-top { display: flex; justify-content: space-between; align-items: center; gap: 4px; margin-bottom: 1px; }
        .enemy-name { font-weight: bold; color: #f0b45d; font-size: 0.8em; line-height: 1.15; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .enemy-tags { font-size: 0.7em; color: #f1c40f; text-align: center; line-height: 1.25; }
        .enemy-tags.muted { color: #91a9c3; }
        .enemy-card.targeted { border-color: #f39c12; box-shadow: 0 0 8px rgba(243,156,18,0.3); }
        .enemy-empty { color: #7f8c8d; text-align: center; padding: 10px; background: #0d0d12; border-radius: 6px; border: 1px dashed #333; grid-column: 1 / -1; font-size: 0.8em; }
        .battlefield-wrap { position: relative; margin-top: 10px; height: 228px; border: 1px solid #233346; border-radius: 14px; overflow: hidden; background: linear-gradient(180deg, #172434 0%, #0d1520 60%, #11161b 100%); box-shadow: inset 0 0 30px rgba(0,0,0,0.35); }
        #battlefield-canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
        .battlefield-caption { position: absolute; top: 8px; left: 12px; font-size: 0.78em; color: rgba(205, 228, 255, 0.82); letter-spacing: 0.03em; text-shadow: 0 1px 2px rgba(0,0,0,0.45); pointer-events: none; }
        .bulk-salvage-bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; padding: 10px 12px; background: #11151c; border: 1px solid #26384a; border-radius: 10px; }
        .bulk-salvage-filters { display: flex; flex-wrap: wrap; gap: 12px; color: #c9d7e5; }
        .bulk-salvage-filters label { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.86em; }
        .bulk-salvage-action { background: linear-gradient(180deg, #596b7d 0%, #44515f 100%); border-color: #7d8d9e; }
        .cloud-panel { margin-top: 14px; padding: 14px; border-radius: 10px; border: 1px solid #29445c; background: linear-gradient(180deg, #101720 0%, #0b1118 100%); }
        .cloud-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
        .cloud-title { color: #7fc9ff; font-size: 0.98em; font-weight: bold; }
        .cloud-subtitle { color: #89a3bd; font-size: 0.82em; line-height: 1.45; margin-top: 4px; }
        .cloud-status-pill { display: inline-flex; align-items: center; justify-content: center; padding: 5px 10px; border-radius: 999px; font-size: 0.78em; font-weight: bold; background: #24313f; color: #b2c7da; border: 1px solid #35516a; white-space: nowrap; }
        .cloud-status-pill.online { background: #173625; border-color: #2e8b57; color: #9ef0bf; }
        .cloud-status-pill.syncing { background: #2d240f; border-color: #9f7b1c; color: #ffe28a; }
        .cloud-status-pill.error { background: #351717; border-color: #8f3838; color: #ffb0b0; }
        .cloud-row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-top: 10px; }
        .cloud-actions { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; margin-top: 10px; }
        .cloud-actions.secondary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .cloud-meta { margin-top: 12px; padding: 10px 12px; background: #0d131b; border: 1px solid #1f3346; border-radius: 8px; color: #c1d0df; font-size: 0.82em; }
        .cloud-meta strong { display: inline-block; color: #f6c461; min-width: 94px; }
        .cloud-actions button { width: 100%; }
        .cloud-actions .secondary-action { background: #263544; border-color: #3c5570; }
        .cloud-actions .danger-action { background: #5b2323; border-color: #824040; }
        .startup-overlay { display: none; position: fixed; inset: 0; z-index: 14000; padding: 28px; background:
            radial-gradient(circle at top left, rgba(77, 146, 220, 0.22), transparent 34%),
            radial-gradient(circle at top right, rgba(241, 169, 69, 0.16), transparent 30%),
            linear-gradient(180deg, rgba(7, 11, 17, 0.96) 0%, rgba(4, 7, 12, 0.985) 72%, rgba(2, 4, 8, 1) 100%);
            backdrop-filter: blur(16px);
        }
        .startup-overlay.active { display: flex; }
        .startup-overlay::before { content: ''; position: absolute; inset: -10% -8%; background:
            radial-gradient(circle at 18% 26%, rgba(104, 193, 255, 0.12), transparent 28%),
            radial-gradient(circle at 72% 22%, rgba(246, 180, 79, 0.11), transparent 26%),
            radial-gradient(circle at 52% 80%, rgba(255, 255, 255, 0.035), transparent 35%);
            pointer-events: none; }
        .startup-overlay::after { content: ''; position: absolute; inset: 0; background-image:
            linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 42px 42px; mask-image: linear-gradient(180deg, rgba(0,0,0,0.45), rgba(0,0,0,0.02)); pointer-events: none; }
        .startup-shell { position: relative; z-index: 1; width: min(1320px, 100%); margin: auto; display: grid; grid-template-columns: minmax(0, 1fr) minmax(360px, 440px); gap: 30px; align-items: stretch; }
